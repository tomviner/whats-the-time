name: Publish

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Build tagged wheel
        shell: bash
        run: |
          minute="$(date -u '+%Y-%m-%d %H:%M')"
          tag="$(date -u '+%Y%m%d%H%M%S')${GITHUB_RUN_ATTEMPT}"
          WHATS_THE_TIME_BUILD_MINUTE="$minute" \
          WHATS_THE_TIME_BUILD_TAG="$tag" \
          ./scripts/build-minute-wheel.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/whats-the-time
    permissions:
      id-token: write
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --no-attestations dist/*.whl
